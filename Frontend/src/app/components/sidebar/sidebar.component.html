<nav class="navbar navbar-vertical navbar-expand-md navbar-light bg-white" id="sidenav-main">
  <div class="container-fluid">
    <!-- Toggler -->
    <button class="navbar-toggler" type="button" (click)="isCollapsed=!isCollapsed"
       aria-controls="sidenav-collapse-main">
      <span class="navbar-toggler-icon"></span>
    </button>
    <!-- Brand -->
    <a class="navbar-brand pt-0" routerLinkActive="active" [routerLink]="['/dashboard']">
      <span class="h2 text-primary font-weight-bold">SafeMind</span>
    </a>
    <!-- User -->
    <ul class="nav align-items-center d-md-none">
      <li class="nav-item" ngbDropdown placement="bottom-right">
        <a class="nav-link" role="button" ngbDropdownToggle>
          <div class="media align-items-center">
            <span class="avatar avatar-sm rounded-circle bg-primary">
              <i class="ni ni-single-02 text-white"></i>
            </span>
          </div>
        </a>
        <div class="dropdown-menu-arrow dropdown-menu-right" ngbDropdownMenu>
          <div class="dropdown-header noti-title">
            <h6 class="text-overflow m-0">Bienvenido</h6>
          </div>
          <a routerLinkActive="active" [routerLink]="['/user-profile']" class="dropdown-item">
            <i class="ni ni-single-02"></i>
            <span>Mi perfil</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="javascript:void(0)" class="dropdown-item" (click)="securityService.logout()">
            <i class="ni ni-user-run"></i>
            <span>Cerrar sesion</span>
          </a>
        </div>
      </li>
    </ul>
    <!-- Collapse -->
    <div class="collapse navbar-collapse" [ngbCollapse]="isCollapsed" id="sidenav-collapse-main">
      <!-- Collapse header -->
      <div class="navbar-collapse-header d-md-none">
        <div class="row">
          <div class="col-6 collapse-brand">
            <a routerLinkActive="active" [routerLink]="['/dashboard']">
              <span class="h3 text-primary font-weight-bold">SafeMind</span>
            </a>
          </div>
          <div class="col-6 collapse-close">
            <button type="button" class="navbar-toggler" (click)="isCollapsed=!isCollapsed">
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
      </div>

      <!-- User Info -->
      <div class="text-center py-3 border-bottom mb-3" *ngIf="user && user.name">
        <div class="avatar avatar-lg rounded-circle bg-gradient-primary mb-2">
          <img *ngIf="user.photoURL" [src]="user.photoURL" alt="Foto de perfil" class="rounded-circle" style="width: 100%; height: 100%; object-fit: cover;">
          <i *ngIf="!user.photoURL" class="ni ni-single-02 text-white" style="font-size: 1.5rem;"></i>
        </div>
        <h5 class="mb-0">{{ user.name }}</h5>
        <small class="text-muted">{{ user.email }}</small>
      </div>

      <!-- Navigation -->
      <ul class="navbar-nav" *ngIf="securityService.existSession()">
        <li *ngFor="let menuItem of menuItems" class="{{menuItem.class}} nav-item">
          <a routerLinkActive="active" [routerLink]="[menuItem.path]" class="nav-link">
            <i class="ni {{menuItem.icon}}"></i>
            {{menuItem.title}}
          </a>
        </li>
      </ul>

      <!-- Divider -->
      <hr class="my-3">
      
      <!-- Recursos -->
      <h6 class="navbar-heading text-muted">Recursos</h6>
      <ul class="navbar-nav mb-md-3">
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">
            <i class="ni ni-books text-info"></i> Guias de bienestar
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">
            <i class="ni ni-bulb-61 text-warning"></i> Tips de estudio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">
            <i class="ni ni-headphones text-success"></i> Meditaciones
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
