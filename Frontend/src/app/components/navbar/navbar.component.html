<nav class="navbar navbar-top navbar-expand-md navbar-dark" id="navbar-main">
  <div class="container-fluid">
    <!-- Brand -->
    <a class="h4 mb-0 text-white text-uppercase d-none d-lg-inline-block"
       routerLinkActive="active"
       [routerLink]="['/dashboard']">{{ getTitle() }}</a>

    <!-- Búsqueda -->
    <form class="navbar-search navbar-search-dark form-inline mr-3 d-none d-md-flex ml-lg-auto">
      <div class="form-group mb-0" [ngClass]="{ 'focused': focus === true }">
        <div class="input-group input-group-alternative">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
          </div>
          <input class="form-control"
                 placeholder="Search"
                 type="text"
                 (focus)="focus = true"
                 (blur)="focus = false">
        </div>
      </div>
    </form>

    <!-- Usuario -->
    <ul class="navbar-nav align-items-center d-none d-md-flex">
      <li class="nav-item" ngbDropdown placement="bottom-right">
        <a class="nav-link pr-0" role="button" ngbDropdownToggle>
          <div class="media align-items-center">

            <!-- Foto del usuario o ícono por defecto -->
            <span class="avatar avatar-sm rounded-circle">
              <img *ngIf="user?.foto_url"
                   [src]="user.foto_url"
                   [alt]="user?.name || 'Usuario'"
                   style="object-fit:cover; width:100%; height:100%;">
              <span *ngIf="!user?.foto_url"
                    class="rounded-circle bg-gradient-primary d-flex align-items-center justify-content-center"
                    style="width:100%; height:100%;">
                <i class="ni ni-single-02 text-white" style="font-size:1rem;"></i>
              </span>
            </span>

            <div class="media-body ml-2 d-none d-lg-block">
              <span class="mb-0 text-sm font-weight-bold">
                {{ user?.name || 'Invitado' }}
              </span>
            </div>
          </div>
        </a>

        <div class="dropdown-menu-arrow dropdown-menu-right" ngbDropdownMenu>
          <div class="dropdown-header noti-title">
            <h6 class="text-overflow m-0">Bienvenido</h6>
          </div>
          <a routerLinkActive="active" [routerLink]="['/user-profile']" class="dropdown-item">
            <i class="ni ni-single-02"></i>
            <span>Mi perfil</span>
          </a>
          <a routerLinkActive="active" [routerLink]="['/user-profile']" class="dropdown-item">
            <i class="ni ni-settings-gear-65"></i>
            <span>Configuración</span>
          </a>
          <div class="dropdown-divider"></div>
          <!-- Llama al método logout() del componente, que navega al login -->
          <a href="javascript:void(0)"
             class="dropdown-item"
             (click)="logout()">
            <i class="ni ni-user-run"></i>
            <span>Cerrar sesión</span>
          </a>
        </div>
      </li>
    </ul>

  </div>
</nav>
