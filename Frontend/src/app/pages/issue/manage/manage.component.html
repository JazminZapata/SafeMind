<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <h3 class="mb-0" *ngIf="mode==1">Issue Details</h3>
                    <h3 class="mb-0" *ngIf="mode==2">Create Issue</h3>
                    <h3 class="mb-0" *ngIf="mode==3">Update Issue</h3>
                </div>
                <div class="card-body">
                    <form class="form" [formGroup]="theFormGroup">
                        <div class="card-body container">
                            <!-- ID -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">ID</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" formControlName="id" disabled>
                                </div>
                            </div>
                            <br>

                            <!-- Motorcycle Select -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Motorcycle</label>
                                </div>
                                <div class="col-9">
                                    <select 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="motorcycle_id">
                                        <option value="">-- Select Motorcycle --</option>
                                        <option *ngFor="let motorcycle of motorcycles" [value]="motorcycle.id">
                                            {{motorcycle.license_plate}} (ID: {{motorcycle.id}})
                                        </option>
                                    </select>
                                    
                                    <div *ngIf="getTheFormGroup.motorcycle_id.errors && (getTheFormGroup.motorcycle_id.dirty || getTheFormGroup.motorcycle_id.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.motorcycle_id.errors.required" class="text-danger">
                                            Required
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Description -->
                            <div class="row">
                                <div class="col-3">Description</div>
                                <div class="col-9">
                                    <input type="text" class="form-control" 
                                        [disabled]="mode==1" formControlName="description">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.description.errors && (getTheFormGroup.description.dirty || getTheFormGroup.description.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.description.errors.required"
                                            class="msnError">Required</strong>
                                        <strong *ngIf="getTheFormGroup.description.errors.minlength"
                                            class="msnError">Invalid
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Issue Type -->
                            <div class="row">
                                <div class="col-3">Issue Type</div>
                                <div class="col-9">
                                    <input type="text" class="form-control" 
                                        [disabled]="mode==1" formControlName="issue_type">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.issue_type.errors && (getTheFormGroup.issue_type.dirty || getTheFormGroup.issue_type.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.issue_type.errors.required"
                                            class="msnError">Required</strong>
                                        <strong *ngIf="getTheFormGroup.issue_type.errors.minlength"
                                            class="msnError">Invalid
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Date Reported con calendario -->
                            <div class="row">
                                <div class="col-3">Date Reported</div>
                                <div class="col-9">
                                    <input 
                                        type="datetime-local" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="date_reported">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.date_reported.errors && (getTheFormGroup.date_reported.dirty || getTheFormGroup.date_reported.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.date_reported.errors.required"
                                            class="text-danger">Required</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Status -->
                            <div class="row">
                                <div class="col-3">Status</div>
                                <div class="col-9">
                                    <input type="text" class="form-control" 
                                        [disabled]="mode==1" formControlName="status">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.status.errors && (getTheFormGroup.status.dirty || getTheFormGroup.status.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.status.errors.required"
                                            class="msnError">Required</strong>
                                        <strong *ngIf="getTheFormGroup.status.errors.minlength"
                                            class="msnError">Invalid
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Buttons -->
                            <div class="row">
                                <div class="col-3"></div>
                                <div class="col-9">
                                    <button 
                                        type="button" 
                                        class="btn btn-primary btn-block" 
                                        (click)="back()" 
                                        *ngIf="mode==1">
                                        <i class="fas fa-arrow-left"></i> Go Back
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-success btn-block" 
                                        (click)="create()" 
                                        *ngIf="mode==2">
                                        <i class="fas fa-save"></i> Create
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-warning btn-block" 
                                        (click)="update()" 
                                        *ngIf="mode==3">
                                        <i class="fas fa-save"></i> Update
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
