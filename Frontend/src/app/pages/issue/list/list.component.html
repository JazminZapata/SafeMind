<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Issues</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/issues/create']">
                                <i class="fas fa-plus"></i> Create New Issue
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Motorcycle ID</th>
                                    <th scope="col">Description</th>
                                    <th scope="col">Issue Type</th>
                                    <th scope="col">Date Reported</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let issue of issues">
                                    <td>{{issue.id}}</td>
                                    <td>{{issue.motorcycle_id}}</td>
                                    <td>{{issue.description}}</td>
                                    <td>{{issue.issue_type}}</td>
                                    <td>{{issue.date_reported | date:'dd/MM/yyyy HH:mm'}}</td>
                                    <td>{{issue.status}}</td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/issues/view', issue.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/issues/update', issue.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(issue.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
