<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Addresses</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/addresses/manage']">
                                <i class="fas fa-plus"></i> Create New Address
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Order ID</th>
                                    <th scope="col">Street</th>
                                    <th scope="col">City</th>
                                    <th scope="col">State</th>
                                    <th scope="col">Postal Code</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let address of addresses">
                                    <td>{{address.id}}</td>
                                    <td>{{address.order_id}}</td>
                                    <td>{{address.street}}</td>
                                    <td>{{address.city}}</td>
                                    <td>{{address.state}}</td>
                                    <td>{{address.postal_code}}</td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/addresses/view', address.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/addresses/manage', address.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(address.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
