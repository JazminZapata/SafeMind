<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <h3 class="mb-0" *ngIf="mode==1">Driver Details</h3>
                    <h3 class="mb-0" *ngIf="mode==2">Create Driver</h3>
                    <h3 class="mb-0" *ngIf="mode==3">Update Driver</h3>
                </div>
                <div class="card-body">
                    <form class="form" [formGroup]="theFormGroup">
                        <div class="card-body container">
                            <!-- ID -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">ID</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" formControlName="id" disabled>
                                </div>
                            </div>
                            <br>

                            <!-- Name -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Name</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" 
                                        [disabled]="mode==1" formControlName="name">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.name.errors && (getTheFormGroup.name.dirty || getTheFormGroup.name.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.name.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.name.errors.minlength"
                                            class="text-danger">Minimum 3 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- License Number -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">License Number</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" 
                                        [disabled]="mode==1" formControlName="license_number">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.license_number.errors && (getTheFormGroup.license_number.dirty || getTheFormGroup.license_number.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.license_number.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.license_number.errors.minlength"
                                            class="text-danger">Minimum 5 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Phone -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Phone</label>
                                </div>
                                <div class="col-9">
                                    <input type="tel" class="form-control" 
                                        [disabled]="mode==1" formControlName="phone"
                                        placeholder="3001234567">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.phone.errors && (getTheFormGroup.phone.dirty || getTheFormGroup.phone.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.phone.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.phone.errors.pattern"
                                            class="text-danger">Must be 10 digits</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Email -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Email</label>
                                </div>
                                <div class="col-9">
                                    <input type="email" class="form-control" 
                                        [disabled]="mode==1" formControlName="email"
                                        placeholder="driver@example.com">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.email.errors && (getTheFormGroup.email.dirty || getTheFormGroup.email.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.email.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.email.errors.email"
                                            class="text-danger">Invalid email format</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Status -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Status</label>
                                </div>
                                <div class="col-9">
                                    <select 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="status">
                                        <option value="available">Available</option>
                                        <option value="busy">Busy</option>
                                        <option value="offline">Offline</option>
                                    </select>
                                    
                                    <div *ngIf="getTheFormGroup.status.errors && (getTheFormGroup.status.dirty || getTheFormGroup.status.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.status.errors.required" class="text-danger">
                                            Required
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Buttons -->
                            <div class="row">
                                <div class="col-3"></div>
                                <div class="col-9">
                                    <button 
                                        type="button" 
                                        class="btn btn-primary btn-block" 
                                        (click)="back()" 
                                        *ngIf="mode==1">
                                        <i class="fas fa-arrow-left"></i> Go Back
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-success btn-block" 
                                        (click)="create()" 
                                        *ngIf="mode==2">
                                        <i class="fas fa-save"></i> Create
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-warning btn-block" 
                                        (click)="update()" 
                                        *ngIf="mode==3">
                                        <i class="fas fa-save"></i> Update
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
