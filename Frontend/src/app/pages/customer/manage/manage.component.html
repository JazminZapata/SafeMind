<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <h3 class="mb-0" *ngIf="mode==1">Customer Details</h3>
                    <h3 class="mb-0" *ngIf="mode==2">Create Customer</h3>
                    <h3 class="mb-0" *ngIf="mode==3">Update Customer</h3>
                </div>
                <div class="card-body">
                    <form class="form" [formGroup]="theFormGroup">
                        <div class="card-body container">
                            <!-- ID -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">ID</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" formControlName="id" disabled>
                                </div>
                            </div>
                            <br>

                            <!-- Name -->
                            <div class="row">
                                <div class="col-3">Name</div>
                                <div class="col-9">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="name"
                                        placeholder="Enter customer name">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.name.errors && (getTheFormGroup.name.dirty || getTheFormGroup.name.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.name.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.name.errors.minlength"
                                            class="text-danger">Minimum 3 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Email -->
                            <div class="row">
                                <div class="col-3">Email</div>
                                <div class="col-9">
                                    <input 
                                        type="email" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="email"
                                        placeholder="Enter email address">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.email.errors && (getTheFormGroup.email.dirty || getTheFormGroup.email.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.email.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.email.errors.email"
                                            class="text-danger">Invalid email format</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Phone -->
                            <div class="row">
                                <div class="col-3">Phone</div>
                                <div class="col-9">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="phone"
                                        placeholder="Enter phone number">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.phone.errors && (getTheFormGroup.phone.dirty || getTheFormGroup.phone.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.phone.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.phone.errors.minlength"
                                            class="text-danger">Minimum 7 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Buttons -->
                            <div class="row">
                                <div class="col-3"></div>
                                <div class="col-9">
                                    <button 
                                        type="button" 
                                        class="btn btn-primary btn-block" 
                                        (click)="back()" 
                                        *ngIf="mode==1">
                                        <i class="fas fa-arrow-left"></i> Go Back
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-success btn-block" 
                                        (click)="create()" 
                                        *ngIf="mode==2">
                                        <i class="fas fa-save"></i> Create
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-warning btn-block" 
                                        (click)="update()" 
                                        *ngIf="mode==3">
                                        <i class="fas fa-save"></i> Update
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
