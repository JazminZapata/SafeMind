<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <h3 class="mb-0" *ngIf="mode==1">Motorcycle Details</h3>
                    <h3 class="mb-0" *ngIf="mode==2">Create Motorcycle</h3>
                    <h3 class="mb-0" *ngIf="mode==3">Update Motorcycle</h3>
                </div>
                <div class="card-body">
                    <form class="form" [formGroup]="theFormGroup">
                        <div class="card-body container">
                            <!-- ID -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">ID</label>
                                </div>
                                <div class="col-9">
                                    <input type="text" class="form-control" formControlName="id" disabled>
                                </div>
                            </div>
                            <br>

                            <!-- License Plate -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">License Plate</label>
                                </div>
                                <div class="col-9">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="license_plate"
                                        placeholder="ABC123"
                                        style="text-transform: uppercase;">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.license_plate.errors && (getTheFormGroup.license_plate.dirty || getTheFormGroup.license_plate.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.license_plate.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.license_plate.errors.minlength"
                                            class="text-danger">Minimum 6 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Brand -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Brand</label>
                                </div>
                                <div class="col-9">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="brand"
                                        placeholder="Honda, Yamaha, Suzuki, etc.">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.brand.errors && (getTheFormGroup.brand.dirty || getTheFormGroup.brand.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.brand.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.brand.errors.minlength"
                                            class="text-danger">Minimum 2 characters</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Year -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Year</label>
                                </div>
                                <div class="col-9">
                                    <input 
                                        type="number" 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="year"
                                        placeholder="2024"
                                        min="1900"
                                        [max]="getMaxYear()">
                                        
                                    <div
                                        *ngIf="getTheFormGroup.year.errors && (getTheFormGroup.year.dirty || getTheFormGroup.year.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.year.errors.required"
                                            class="text-danger">Required</strong>
                                        <strong *ngIf="getTheFormGroup.year.errors.min"
                                            class="text-danger">Year must be 1900 or later</strong>
                                        <strong *ngIf="getTheFormGroup.year.errors.max"
                                            class="text-danger">Invalid year</strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Status -->
                            <div class="row mb-3">
                                <div class="col-3">
                                    <label class="form-control-label">Status</label>
                                </div>
                                <div class="col-9">
                                    <select 
                                        class="form-control" 
                                        [disabled]="mode==1" 
                                        formControlName="status">
                                        <option value="available">Available</option>
                                        <option value="in_use">In Use</option>
                                        <option value="maintenance">Maintenance</option>
                                        <option value="out_of_service">Out of Service</option>
                                    </select>
                                    
                                    <div *ngIf="getTheFormGroup.status.errors && (getTheFormGroup.status.dirty || getTheFormGroup.status.touched || trySend)">
                                        <strong *ngIf="getTheFormGroup.status.errors.required" class="text-danger">
                                            Required
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <br>

                            <!-- Buttons -->
                            <div class="row">
                                <div class="col-3"></div>
                                <div class="col-9">
                                    <button 
                                        type="button" 
                                        class="btn btn-primary btn-block" 
                                        (click)="back()" 
                                        *ngIf="mode==1">
                                        <i class="fas fa-arrow-left"></i> Go Back
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-success btn-block" 
                                        (click)="create()" 
                                        *ngIf="mode==2">
                                        <i class="fas fa-save"></i> Create
                                    </button>
                                    
                                    <button 
                                        type="button" 
                                        class="btn btn-warning btn-block" 
                                        (click)="update()" 
                                        *ngIf="mode==3">
                                        <i class="fas fa-save"></i> Update
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
