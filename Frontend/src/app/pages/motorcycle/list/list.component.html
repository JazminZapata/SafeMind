<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Motorcycles</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/motorcycles/create']">
                                <i class="fas fa-plus"></i> Create New Motorcycle
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">License Plate</th>
                                    <th scope="col">Brand</th>
                                    <th scope="col">Year</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let motorcycle of motorcycles">
                                    <td>{{motorcycle.id}}</td>
                                    <td>
                                        <span class="font-weight-bold">{{motorcycle.license_plate}}</span>
                                    </td>
                                    <td>{{motorcycle.brand}}</td>
                                    <td>{{motorcycle.year}}</td>
                                    <td>
                                        <span class="badge badge-dot mr-4">
                                            <i [ngClass]="{
                                                'bg-success': motorcycle.status === 'available',
                                                'bg-warning': motorcycle.status === 'in_use',
                                                'bg-danger': motorcycle.status === 'maintenance',
                                                'bg-secondary': motorcycle.status === 'out_of_service'
                                            }"></i>
                                            <span class="status">{{motorcycle.status}}</span>
                                        </span>
                                    </td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/motorcycles/view', motorcycle.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/motorcycles/update', motorcycle.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(motorcycle.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
