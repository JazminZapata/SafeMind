<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Shifts</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/shifts/create']">
                                <i class="fas fa-plus"></i> Create New Shift
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Driver ID</th>
                                    <th scope="col">Motorcycle ID</th>
                                    <th scope="col">Start Time</th>
                                    <th scope="col">End Time</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let shift of shifts">
                                    <td>{{shift.id}}</td>
                                    <td>{{shift.driver_id}}</td>
                                    <td>{{shift.motorcycle_id}}</td>
                                    <td>{{shift.start_time | date:'dd/MM/yyyy HH:mm'}}</td>
                                    <td>
                                        <span *ngIf="shift.end_time">
                                            {{shift.end_time | date:'dd/MM/yyyy HH:mm'}}
                                        </span>
                                        <span *ngIf="!shift.end_time" class="text-muted">
                                            <em>In progress</em>
                                        </span>
                                    </td>
                                    <td>
                                        <span class="badge badge-dot mr-4">
                                            <i [ngClass]="{
                                                'bg-success': shift.status === 'active',
                                                'bg-info': shift.status === 'completed',
                                                'bg-warning': shift.status === 'paused',
                                                'bg-danger': shift.status === 'cancelled'
                                            }"></i>
                                            <span class="status">{{shift.status}}</span>
                                        </span>
                                    </td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/shifts/view', shift.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/shifts/update', shift.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>

                                        <!-- Botón End Shift (solo si está activo) -->
                                        <button 
                                            *ngIf="shift.status === 'active'"
                                            class="btn btn-secondary btn-sm mr-2" 
                                            (click)="endShift(shift.id)">
                                            <i class="fas fa-stop-circle"></i> End
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(shift.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
