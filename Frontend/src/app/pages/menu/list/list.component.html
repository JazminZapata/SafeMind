<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Menus</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/menus/create']">
                                <i class="fas fa-plus"></i> Create New Menu
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Restaurant ID</th>
                                    <th scope="col">Product ID</th>
                                    <th scope="col">Price</th>
                                    <th scope="col">Availability</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let menu of menus">
                                    <td>{{menu.id}}</td>
                                    <td>{{menu.restaurant_id}}</td>
                                    <td>{{menu.product_id}}</td>
                                    <td>${{menu.price | number:'1.2-2'}}</td>
                                    <td>{{menu.availability ? 'Available' : 'Not Available'}}</td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/menus/view', menu.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/menus/update', menu.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(menu.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
