<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
</div>
<!-- Page content -->
<div class="container-fluid mt--7">
    <!-- Table -->
    <div class="row">
        <div class="col">
            <div class="card shadow">
                <div class="card-header bg-transparent">
                    <div class="row align-items-center">
                        <div class="col">
                            <h3 class="mb-0">Photos</h3>
                        </div>
                        <div class="col text-right">
                            <!-- Botón Create en la esquina superior derecha -->
                            <button 
                                class="btn btn-success btn-sm" 
                                [routerLink]="['/photos/create']">
                                <i class="fas fa-plus"></i> Upload New Photo
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Preview</th>
                                    <th scope="col">Issue ID</th>
                                    <th scope="col">Caption</th>
                                    <th scope="col">Taken At</th>
                                    <th scope="col">Options</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let photo of photos">
                                    <td>{{photo.id}}</td>
                                    <td>
                                        <img 
                                            *ngIf="photo.image_url"
                                            [src]="getImageUrl(photo.image_url)" 
                                            alt="Photo preview"
                                            class="img-thumbnail"
                                            style="width: 80px; height: 80px; object-fit: cover; cursor: pointer;"
                                            (click)="viewFullImage(photo.image_url)">
                                        <span *ngIf="!photo.image_url" class="text-muted">
                                            <em>No image</em>
                                        </span>
                                    </td>
                                    <td>{{photo.issue_id}}</td>
                                    <td>
                                        <span *ngIf="photo.caption">{{photo.caption}}</span>
                                        <span *ngIf="!photo.caption" class="text-muted">
                                            <em>No caption</em>
                                        </span>
                                    </td>
                                    <td>
                                        <span *ngIf="photo.taken_at">
                                            {{photo.taken_at | date:'dd/MM/yyyy HH:mm'}}
                                        </span>
                                        <span *ngIf="!photo.taken_at" class="text-muted">
                                            <em>Not specified</em>
                                        </span>
                                    </td>
                                    <td>
                                        <!-- Botón View con navegación -->
                                        <button 
                                            class="btn btn-info btn-sm mr-2" 
                                            [routerLink]="['/photos/view', photo.id]">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                        
                                        <!-- Botón Update con navegación -->
                                        <button 
                                            class="btn btn-warning btn-sm mr-2" 
                                            [routerLink]="['/photos/update', photo.id]">
                                            <i class="fas fa-edit"></i> Update
                                        </button>
                                        
                                        <!-- Botón Delete -->
                                        <button 
                                            class="btn btn-danger btn-sm" 
                                            (click)="delete(photo.id)">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
